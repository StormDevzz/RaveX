name: Build and Release

on:
  push:
    branches: [main, master]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: Extract version
        run: |
          VERSION=$(grep mod_version gradle.properties | cut -d= -f2 | tr -d ' ')
          TAG="volthack${VERSION//./}"
          JAR=$(ls build/libs/*.jar | grep -v sources | grep -v slim | head -1)

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "JAR_PATH=$JAR" >> $GITHUB_ENV

      - name: Delete existing release
        run: |
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push --delete origin "$TAG" 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        run: |
          gh release create "$TAG" "$JAR_PATH" \
            --title "VoltHack $VERSION" \
            --notes "VoltHack $VERSION" \
            --latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
